name: Sync Ménages → Guesty

on:
  schedule:
    - cron: "*/5 * * * *"   # toutes les 5 minutes
  workflow_dispatch:         # bouton manuel dans GitHub si besoin

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 schedule

      # Persiste le token Guesty entre les runs (quota : 5 tokens / 24h).
      # Clé unique par run + restore-keys → cache "mutable" : on restaure le
      # dernier token connu, et on resauvegarde le fichier à chaque run.
      - name: Cache Guesty token
        uses: actions/cache@v4
        with:
          path: .guesty_token.json
          key: guesty-token-${{ github.run_id }}
          restore-keys: |
            guesty-token-

      - name: Run sync
        env:
          WAC_EMAIL:    ${{ secrets.WAC_EMAIL }}
          WAC_PASSWORD: ${{ secrets.WAC_PASSWORD }}
          GUESTY_CLIENT_ID:     ${{ secrets.GUESTY_CLIENT_ID }}
          GUESTY_CLIENT_SECRET: ${{ secrets.GUESTY_CLIENT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python sync_menages.py
